<svg viewBox="0 0 1600 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe4f2"/>
      <stop offset="100%" stop-color="#e9f6ea"/>
    </linearGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c3dfa0"/>
      <stop offset="100%" stop-color="#aad187"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f9b49"/>
      <stop offset="100%" stop-color="#437332"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c85e"/>
      <stop offset="100%" stop-color="#7cb648"/>
    </linearGradient>

    <g id="flower">
      <circle cx="-6" cy="0" r="3.2" fill="currentColor"/>
      <circle cx="6" cy="0" r="3.2" fill="currentColor"/>
      <circle cx="0" cy="-6" r="3.2" fill="currentColor"/>
      <circle cx="0" cy="6" r="3.2" fill="currentColor"/>
      <circle cx="0" cy="0" r="2.6" fill="#fff8dc"/>
    </g>

    <g id="tree">
      <circle cx="-16" cy="4" r="17" fill="#3f6b30"/>
      <circle cx="14" cy="0" r="20" fill="#4d7e39"/>
      <circle cx="-2" cy="-16" r="19" fill="#548a3e"/>
      <circle cx="0" cy="10" r="15" fill="#3f6b30"/>
    </g>
  </defs>

  <rect width="1600" height="240" fill="url(#sky)"/>

  <circle cx="1430" cy="60" r="30" fill="#fff2b8" opacity="0.9"/>
  <g fill="#ffffff" opacity="0.6">
    <ellipse cx="220" cy="48" rx="60" ry="14"/>
    <ellipse cx="270" cy="40" rx="40" ry="11"/>
  </g>

  <!-- distant hills -->
  <path d="M0,132 C200,108 420,148 660,122 C920,98 1180,138 1600,112 L1600,240 L0,240 Z" fill="url(#hills)"/>

  <!-- forest band -->
  <path d="M0,168 C220,146 440,178 700,156 C960,132 1220,172 1600,150 L1600,240 L0,240 Z" fill="url(#forest)"/>

  <!-- tree clusters -->
  <use href="#tree" x="130" y="145"/>
  <use href="#tree" x="195" y="158"/>
  <use href="#tree" x="1080" y="132"/>
  <use href="#tree" x="1145" y="148"/>
  <use href="#tree" x="1460" y="150"/>

  <!-- foreground agricultural field -->
  <path d="M0,205 C260,186 480,218 720,198 C980,178 1240,210 1600,190 L1600,240 L0,240 Z" fill="url(#field)"/>
  <g stroke="#5c8f3a" stroke-width="2.5" opacity="0.4" fill="none">
    <path d="M0,214 C260,196 480,226 720,207"/>
    <path d="M0,224 C260,206 480,235 720,217"/>
    <path d="M900,203 C1140,186 1340,208 1600,196"/>
    <path d="M900,213 C1140,196 1340,218 1600,206"/>
  </g>

  <!-- blossoming meadow -->
  <g>
    <use href="#flower" x="360" y="188" color="#f4d35e"/>
    <use href="#flower" x="410" y="205" color="#ea9fc0"/>
    <use href="#flower" x="470" y="182" color="#ffffff"/>
    <use href="#flower" x="760" y="192" color="#c9a8e6"/>
    <use href="#flower" x="815" y="176" color="#f4d35e"/>
    <use href="#flower" x="500" y="210" color="#f4d35e"/>
  </g>
</svg>
