<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe4f2"/>
      <stop offset="60%" stop-color="#e3f4e9"/>
      <stop offset="100%" stop-color="#eef8e6"/>
    </linearGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdd9c"/>
      <stop offset="100%" stop-color="#a6cf82"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fa856"/>
      <stop offset="100%" stop-color="#4f8c40"/>
    </linearGradient>
    <linearGradient id="fieldA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fc45f"/>
      <stop offset="100%" stop-color="#78b34a"/>
    </linearGradient>
    <linearGradient id="fieldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fae46"/>
      <stop offset="100%" stop-color="#5d9c3b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#sky)"/>

  <circle cx="1040" cy="66" r="42" fill="#fff2b8" opacity="0.85"/>

  <g fill="#ffffff" opacity="0.65">
    <ellipse cx="170" cy="58" rx="60" ry="15"/>
    <ellipse cx="215" cy="50" rx="42" ry="12"/>
    <ellipse cx="640" cy="90" rx="50" ry="13"/>
  </g>

  <!-- distant hills -->
  <path d="M0,150 C160,120 320,165 520,140 C740,113 940,155 1200,125 L1200,320 L0,320 Z" fill="url(#hills)"/>

  <!-- forest band with treetop texture -->
  <path d="M0,190 C180,165 360,200 560,178 C800,152 980,192 1200,168 L1200,320 L0,320 Z" fill="url(#forest)"/>
  <g fill="#457436" opacity="0.55">
    <circle cx="60" cy="188" r="16"/>
    <circle cx="90" cy="180" r="20"/>
    <circle cx="125" cy="190" r="15"/>
    <circle cx="330" cy="196" r="17"/>
    <circle cx="365" cy="188" r="21"/>
    <circle cx="400" cy="198" r="14"/>
    <circle cx="700" cy="168" r="16"/>
    <circle cx="735" cy="160" r="20"/>
    <circle cx="770" cy="170" r="15"/>
    <circle cx="1010" cy="180" r="17"/>
    <circle cx="1045" cy="172" r="21"/>
    <circle cx="1080" cy="182" r="15"/>
  </g>

  <!-- foreground agricultural field rows -->
  <path d="M0,230 C220,205 380,245 640,225 C880,207 1000,238 1200,215 L1200,320 L0,320 Z" fill="url(#fieldA)"/>
  <path d="M0,265 C240,245 420,278 660,260 C900,242 1040,270 1200,250 L1200,320 L0,320 Z" fill="url(#fieldB)"/>

  <g stroke="#3f6b2d" stroke-width="2" opacity="0.3" fill="none">
    <path d="M0,278 C240,258 420,290 660,272"/>
    <path d="M0,292 C240,272 420,304 660,286"/>
    <path d="M660,272 C900,254 1040,282 1200,262"/>
    <path d="M660,286 C900,268 1040,296 1200,276"/>
  </g>

  <!-- blossoming meadow: scattered flowers -->
  <g>
    <circle cx="90" cy="260" r="4" fill="#f4d35e"/>
    <circle cx="150" cy="278" r="4" fill="#ea9fc0"/>
    <circle cx="230" cy="255" r="4" fill="#ffffff"/>
    <circle cx="310" cy="272" r="4" fill="#f4d35e"/>
    <circle cx="470" cy="262" r="4" fill="#c9a8e6"/>
    <circle cx="540" cy="280" r="4" fill="#ea9fc0"/>
    <circle cx="770" cy="258" r="4" fill="#ffffff"/>
    <circle cx="850" cy="276" r="4" fill="#f4d35e"/>
    <circle cx="930" cy="260" r="4" fill="#ea9fc0"/>
    <circle cx="1110" cy="270" r="4" fill="#c9a8e6"/>
    <circle cx="1160" cy="255" r="4" fill="#f4d35e"/>
  </g>
</svg>
